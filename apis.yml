    name: APITemplate.io REST API
    description: >-
      REST API for PDF generation (HTML, URL, visual-editor templates) and
      image generation. Bearer-token auth via API key. Regional endpoints
      improve latency.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
