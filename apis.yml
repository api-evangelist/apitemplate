aid: apitemplate
url: https://raw.githubusercontent.com/api-evangelist/apitemplate/refs/heads/main/apis.yml
name: APITemplate.io
kind: company
description: >-
  APITemplate.io is a templating service that auto-generates PDFs and images
  programmatically from HTML/CSS templates with Jinja2-style data binding.
  Drag-and-drop visual editor; sync and async generation with webhooks;
  regional endpoints in US, EU, Singapore and Australia. SDKs for Python,
  JavaScript, PHP, C# and Java.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Document Generation
  - PDF
  - Images
  - Templates
  - API
  - Jinja2
created: '2026-05-08'
modified: '2026-05-08'
