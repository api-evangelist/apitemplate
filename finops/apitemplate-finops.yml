- FOCUS
description: >-
  FOCUS-aligned FinOps profile for APITemplate.io. Billing is a flat monthly
  tier fee; PDF-only and combined PDF+Image tracks let teams pay only for
  what they need. Annual billing is 15-30% cheaper than monthly. Pay-as-
  you-go overage is available on Enterprise.
notes: >-
  Right-sizing the track (PDF-only vs combined) is the highest-leverage
  optimisation, followed by stepping up tier for sustained usage.
sources:
- https://apitemplate.io/pricing/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: APITemplate.io
serviceCategory: Document Generation
billingModel:
  pricingCategory: Subscription (output-tiered)
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: APITemplate.io
  ServiceCategory: Document Generation
  ProviderName: APITemplate.io
  PublisherName: APITemplate.io
  InvoiceIssuerName: APITemplate.io
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingUnit: plan-month
meters:
- name: plan_subscription
  description: Flat monthly plan fee (PDF-only or combined).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - track
  - tier
- name: pdfs_generated
  description: PDFs generated against monthly bundle.
  unit: pdf
  aggregation: sum
  dimensions:
  - account
  - template
- name: images_generated
  description: Images generated against monthly bundle (combined plans).
  unit: image
  aggregation: sum
  dimensions:
  - account
  - template
- name: payg_overage
  description: PAYG overage on Enterprise.
  unit: output
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Use APITemplate dashboard usage page; export per-template counts for chargeback.
- name: Allocation
  description: Use template naming and AWS S3 storage option to allocate output cost by team.
- name: Optimization
  description: Pick PDF-only vs combined track based on actual mix; switch to annual for ~15-30% effective discount; right-size template count.
- name: Accountability
  description: Assign template / API-key owners; alert at 75% of monthly bundle.
