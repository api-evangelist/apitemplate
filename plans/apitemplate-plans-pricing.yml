specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: APITemplate.io
providerId: apitemplate
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Document Generation
- PDF
- Images
- Templates
- API
- Plans
- Pricing
description: >-
  APITemplate.io publishes two pricing tracks — PDF-only and combined PDF+Image
  — each with multiple monthly tiers. Annual billing is 15–30% cheaper than
  monthly. Pay-as-you-go overage is available for Enterprise customers.
notes: >-
  Numeric values reflect the public apitemplate.io/pricing page as of
  2026-05-08. PDF-only plans are usually cheaper than combined plans for
  PDF-heavy workloads.
sources:
- https://apitemplate.io/pricing/
